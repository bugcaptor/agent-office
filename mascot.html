<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Office Mascot</title>
    <style>
      /* 투명 창(이슈 #72): 어떤 배경도 칠하지 않는다. 전역 styles/를 로드하지
         않는 이유도 이것 — 테마 배경색이 들어오면 투명이 깨진다. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        /* 텍스트 선택/드래그 고스트가 창 위에 뜨지 않게. */
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/mascot/main.tsx"></script>
  </body>
</html>
